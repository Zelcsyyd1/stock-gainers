services:
  - type: web
    name: stock-gainers
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: SMTP_HOST
        value: smtp.qq.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
    disk:
      name: stock-gainers-data
      mountPath: /var/data
      sizeGB: 1
