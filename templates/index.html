<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A股涨幅榜 — 实时行情</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
      --red: #f04d4d; --green: #12b86e; --gold: #f5a623;
      --text: #e2e8f0; --muted: #7c8499; --accent: #4e8ef7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif; min-height: 100vh; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; align-items: center;
      justify-content: space-between; height: 60px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .logo span { color: var(--red); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #market-badge {
      display: flex; align-items: center; gap: 6px; padding: 4px 12px;
      border-radius: 20px; font-size: 13px; font-weight: 600;
      background: #1e2233; border: 1px solid var(--border);
    }
    #market-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    #market-badge.open .dot { background: var(--green); animation: pulse 1.5s infinite; }
    #market-badge.open { border-color: var(--green); color: var(--green); }
    #market-badge.closed { border-color: var(--muted); color: var(--muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #clock { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }

    main { padding: 24px; max-width: 1600px; margin: 0 auto; }

    .controls {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .tab-group {
      display: flex; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .tab-group button {
      padding: 7px 18px; border: none; background: transparent;
      color: var(--muted); font-size: 13px; cursor: pointer;
      transition: all .2s; font-family: inherit;
      border-right: 1px solid var(--border);
    }
    .tab-group button:last-child { border-right: none; }
    .tab-group button:hover { color: var(--text); background: #22263a; }
    .tab-group button.active { background: var(--accent); color: #fff; font-weight: 600; }
    .controls-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

    .icon-btn {
      display: flex; align-items: center; gap: 6px; padding: 7px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px;
      cursor: pointer; transition: all .2s; font-family: inherit;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn svg { width: 14px; height: 14px; }
    #refresh-btn.spinning svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #export-btn:hover { border-color: var(--gold); color: var(--gold); }

    #screen-btn {
      background: linear-gradient(135deg,#1e3a5f,#2a1e5f);
      border-color: #4e8ef7; color: #7eb8f7; font-weight: 600;
    }
    #screen-btn:hover { border-color: var(--gold); color: var(--gold); background: linear-gradient(135deg,#3a2e1e,#2a1e1e); }
    #screen-btn.loading { opacity: .7; cursor: not-allowed; pointer-events: none; }
    #screen-btn.loading svg { animation: spin 1s linear infinite; }

    #auto-label {
      display: flex; align-items: center; gap: 6px; font-size: 13px;
      color: var(--muted); cursor: pointer; user-select: none;
    }
    #auto-label input { accent-color: var(--accent); width: 15px; height: 15px; }

    .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 20px; min-width: 140px;
    }
    .stat-card .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .stat-card .value { font-size: 20px; font-weight: 700; }
    .stat-card .value.up   { color: var(--red); }
    .stat-card .value.down { color: var(--green); }

    /* ── Screen banner ── */
    #screen-banner {
      display: none; margin-bottom: 20px;
      background: linear-gradient(135deg,#1a1e35,#1e1a35);
      border: 1px solid #4e3ef7; border-radius: 12px; padding: 16px 20px;
    }
    #screen-banner .banner-title {
      font-size: 15px; font-weight: 700; color: #a0b4ff; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    #screen-banner .banner-conditions {
      font-size: 12px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 10px;
    }
    .cond-tag {
      background: #1e2233; border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 8px; font-size: 12px;
    }
    .cond-tag.pass { border-color: var(--green); color: var(--green); }
    #screen-summary {
      margin-top: 10px; font-size: 13px; color: var(--text);
    }
    #screen-progress {
      display: none; text-align: center; padding: 40px 20px; color: var(--muted);
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      padding: 11px 12px; text-align: right; color: var(--muted);
      font-size: 11px; font-weight: 600; border-bottom: 1px solid var(--border);
      white-space: nowrap; cursor: pointer; user-select: none;
    }
    thead th:first-child,
    thead th:nth-child(2) { text-align: left; }
    thead th:hover { color: var(--text); }
    thead th.sort-asc::after  { content: ' ▲'; color: var(--accent); }
    thead th.sort-desc::after { content: ' ▼'; color: var(--accent); }

    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1e2233; }
    tbody tr.pass-row  { background: rgba(18,184,110,.06); }
    tbody tr.fail-row  { background: rgba(240,77,77,.04); opacity: .7; }

    td { padding: 10px 12px; text-align: right; }
    td:first-child, td:nth-child(2) { text-align: left; }

    .stock-name { font-weight: 600; font-size: 13px; }
    .stock-code { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .badge { display: inline-block; font-size: 10px; padding: 1px 4px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }
    .badge-sh { background: #1e3a5f; color: #5aa3f0; }
    .badge-sz { background: #1e3a30; color: #4acea0; }

    .up   { color: var(--red); }
    .down { color: var(--green); }
    .flat { color: var(--muted); }

    .change-pct {
      font-weight: 700; font-size: 14px;
      padding: 2px 7px; border-radius: 4px;
    }
    .change-pct.up   { background: rgba(240,77,77,.12); }
    .change-pct.down { background: rgba(18,184,110,.12); }
    .change-pct.limit-up { background: var(--red) !important; color: #fff !important; }

    .check-pass { color: var(--green); font-weight: 700; }
    .check-fail { color: var(--red); }
    .check-skip { color: var(--muted); font-size: 11px; }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 16px; border-top: 1px solid var(--border);
    }
    .pagination button {
      padding: 6px 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); cursor: pointer;
      font-size: 13px; font-family: inherit; transition: all .2s;
    }
    .pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .pagination button:disabled { opacity: .35; cursor: not-allowed; }
    .page-info { font-size: 13px; color: var(--muted); }

    #loading, #empty {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }

    @media (max-width: 768px) {
      header { padding: 0 12px; }
      main { padding: 12px; }
      td, th { padding: 8px 6px; font-size: 11px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
    </svg>
    A股&nbsp;<span>涨幅榜</span>
  </div>
  <div class="header-right">
    <div id="market-badge" class="closed">
      <div class="dot"></div>
      <span id="market-status-text">加载中…</span>
    </div>
    <div id="clock">--:--:--</div>
  </div>
</header>

<main>
  <div class="controls">
    <div class="tab-group" id="board-tabs">
      <button data-board="all"       class="active">全部</button>
      <button data-board="shanghai">沪市</button>
      <button data-board="shenzhen">深市</button>
      <button data-board="chinext" >创业板</button>
      <button data-board="star"    >科创板</button>
    </div>
    <div class="controls-right">
      <label id="auto-label">
        <input type="checkbox" id="auto-refresh" checked />
        自动刷新&nbsp;<span id="countdown"></span>
      </label>
      <button class="icon-btn" id="export-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        导出 CSV
      </button>
      <button class="icon-btn" id="refresh-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        刷新
      </button>
      <button class="icon-btn" id="screen-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        2:30 选股
      </button>
    </div>
  </div>

  <!-- Screen banner（筛选结果摘要） -->
  <div id="screen-banner">
    <div class="banner-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      2:30 选股条件
    </div>
    <div class="banner-conditions">
      <span class="cond-tag pass">涨幅 3-5%</span>
      <span class="cond-tag pass">30日内有涨停</span>
      <span class="cond-tag pass">市值 &lt; 200亿</span>
      <span class="cond-tag pass">量比 &gt; 1</span>
      <span class="cond-tag pass">换手率 5-10%</span>
      <span class="cond-tag pass">分时全天在均线上 · 14:30后破新高回落不落均线</span>
    </div>
    <div id="screen-summary"></div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="label">显示股票</div>
      <div class="value" id="stat-total">--</div>
    </div>
    <div class="stat-card">
      <div class="label">最高涨幅</div>
      <div class="value up" id="stat-max">--</div>
    </div>
    <div class="stat-card">
      <div class="label">涨停数量</div>
      <div class="value up" id="stat-limit">--</div>
    </div>
    <div class="stat-card">
      <div class="label">平均涨幅</div>
      <div class="value" id="stat-avg">--</div>
    </div>
    <div class="stat-card">
      <div class="label">更新时间</div>
      <div class="value" id="stat-time" style="font-size:13px;margin-top:4px;color:var(--muted)">--</div>
    </div>
  </div>

  <div class="table-wrap">
    <div id="loading"><div class="spinner"></div><div>正在加载行情数据…</div></div>
    <div id="screen-progress" style="display:none">
      <div class="spinner"></div>
      <div>筛选中，正在获取历史数据和分时图…</div>
      <div style="font-size:12px;margin-top:8px;color:var(--muted)">预计需要 30-60 秒，请稍候</div>
    </div>
    <div id="empty" style="display:none">暂无符合条件的股票</div>
    <table id="stock-table" style="display:none">
      <thead id="thead-normal">
        <tr>
          <th data-col="rank">#</th>
          <th data-col="name">股票</th>
          <th data-col="change_pct">涨跌幅</th>
          <th data-col="price">现价</th>
          <th data-col="change">涨跌额</th>
          <th data-col="volume_ratio">量比</th>
          <th data-col="turnover_rate">换手率</th>
          <th data-col="market_cap">市值(亿)</th>
          <th data-col="open">今开</th>
          <th data-col="high">最高</th>
          <th data-col="low">最低</th>
          <th data-col="volume">成交量(手)</th>
          <th data-col="turnover">成交额(万)</th>
          <th data-col="pe">市盈率</th>
        </tr>
      </thead>
      <thead id="thead-screen" style="display:none">
        <tr>
          <th>#</th>
          <th>股票</th>
          <th>涨跌幅</th>
          <th>现价</th>
          <th>量比</th>
          <th>换手率</th>
          <th>市值(亿)</th>
          <th>30日涨停</th>
          <th>分时条件</th>
          <th>结果</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="pagination" id="pagination" style="display:none">
      <button id="prev-btn" disabled>上一页</button>
      <span class="page-info">第 <span id="page-num">1</span> 页</span>
      <button id="next-btn">下一页</button>
    </div>
  </div>
</main>

<script>
  /* ── State ── */
  let allData = [];
  let screenData = [];
  let page = 1;
  let board = 'all';
  let autoInterval = null;
  let countdown = 30;
  let sortCol = 'change_pct';
  let sortDir = 'desc';
  let isScreenMode = false;
  const PAGE_SIZE = 50;

  /* ── Clock ── */
  function tickClock() {
    const bj = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
    const hh = String(bj.getHours()).padStart(2,'0');
    const mm = String(bj.getMinutes()).padStart(2,'0');
    const ss = String(bj.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `北京 ${hh}:${mm}:${ss}`;
  }
  setInterval(tickClock, 1000); tickClock();

  /* ── Format helpers ── */
  function fmt(n, dec = 2) {
    if (n === undefined || n === null || n === '' || n === '-') return '--';
    const v = parseFloat(n);
    return isNaN(v) ? '--' : v.toFixed(dec);
  }
  function fmtVol(n) {
    if (!n || n === '-') return '--';
    const v = parseInt(n);
    return isNaN(v) ? '--' : v >= 10000 ? (v/10000).toFixed(2)+'万' : v.toString();
  }
  function fmtTurnover(n) {
    if (!n || n === '-') return '--';
    const v = parseFloat(n);
    return isNaN(v) ? '--' : (v/10000).toFixed(2);
  }
  function fmtCap(n) {
    if (!n || n === '-') return '--';
    const v = parseFloat(n);
    return isNaN(v) ? '--' : (v/1e8).toFixed(2);
  }
  function pctClass(v) {
    const n = parseFloat(v);
    if (isNaN(n) || n === 0) return 'flat';
    return n > 0 ? 'up' : 'down';
  }
  function isLimitUp(v) { return parseFloat(v) >= 9.9; }

  /* ── Market badge ── */
  function updateMarketBadge(open, status) {
    const badge = document.getElementById('market-badge');
    document.getElementById('market-status-text').textContent = status;
    badge.className = open ? 'open' : 'closed';
  }

  /* ── Fetch normal data ── */
  async function fetchData() {
    if (isScreenMode) return;
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    try {
      const res = await fetch(`/api/stocks?board=${board}&page=${page}&size=${PAGE_SIZE}`);
      const json = await res.json();
      if (json.success) {
        allData = json.data;
        updateMarketBadge(json.market_open, json.market_status);
        document.getElementById('stat-time').textContent = json.time.slice(11);
        renderNormalTable();
        renderStats();
      }
    } catch(e) { console.error(e); }
    finally { btn.classList.remove('spinning'); }
  }

  /* ── Normal table ── */
  function sortedData(data) {
    return [...data].sort((a, b) => {
      let va = parseFloat(a[sortCol]) || 0, vb = parseFloat(b[sortCol]) || 0;
      return sortDir === 'asc' ? va - vb : vb - va;
    });
  }

  function renderNormalTable() {
    document.getElementById('thead-normal').style.display = '';
    document.getElementById('thead-screen').style.display = 'none';
    const data = sortedData(allData);
    const tbody = document.getElementById('tbody');
    const table = document.getElementById('stock-table');
    const loading = document.getElementById('loading');
    const empty = document.getElementById('empty');
    const pagination = document.getElementById('pagination');

    loading.style.display = 'none';
    document.getElementById('screen-progress').style.display = 'none';

    if (!data.length) {
      table.style.display = 'none'; pagination.style.display = 'none';
      empty.style.display = ''; return;
    }
    empty.style.display = 'none';
    table.style.display = ''; pagination.style.display = 'flex';

    tbody.innerHTML = data.map((s, i) => {
      const pc = pctClass(s.change_pct);
      const pctVal = fmt(s.change_pct) + '%';
      const pctCls = isLimitUp(s.change_pct) ? 'change-pct limit-up' : `change-pct ${pc}`;
      const sign = parseFloat(s.change) > 0 ? '+' : '';
      const mkt = s.market === 'SH' ? '<span class="badge badge-sh">沪</span>' : '<span class="badge badge-sz">深</span>';
      const capVal = parseFloat(s.market_cap);
      const capColor = (!isNaN(capVal) && capVal > 0 && capVal < 20e9) ? 'style="color:var(--green)"' : '';
      const vrVal = parseFloat(s.volume_ratio);
      const vrColor = (!isNaN(vrVal) && vrVal > 1) ? 'style="color:var(--gold)"' : '';
      const trVal = parseFloat(s.turnover_rate);
      const trColor = (!isNaN(trVal) && trVal >= 5 && trVal <= 10) ? 'style="color:var(--gold)"' : '';
      return `<tr>
        <td style="color:var(--muted);font-size:11px">${(page-1)*PAGE_SIZE+i+1}</td>
        <td><div class="stock-name">${s.name}${mkt}</div><div class="stock-code">${s.code}</div></td>
        <td><span class="${pctCls}">${isLimitUp(s.change_pct)?'涨停 ':''}${pctVal}</span></td>
        <td class="${pc}">${fmt(s.price)}</td>
        <td class="${pc}">${sign}${fmt(s.change)}</td>
        <td ${vrColor}>${fmt(s.volume_ratio)}</td>
        <td ${trColor}>${fmt(s.turnover_rate)}%</td>
        <td ${capColor}>${fmtCap(s.market_cap)}</td>
        <td>${fmt(s.open)}</td>
        <td class="up">${fmt(s.high)}</td>
        <td class="down">${fmt(s.low)}</td>
        <td style="color:var(--muted)">${fmtVol(s.volume)}</td>
        <td style="color:var(--muted)">${fmtTurnover(s.turnover)}</td>
        <td style="color:var(--muted)">${fmt(s.pe)}</td>
      </tr>`;
    }).join('');

    document.querySelectorAll('#thead-normal th').forEach(th => {
      th.classList.remove('sort-asc','sort-desc');
      if (th.dataset.col === sortCol) th.classList.add(sortDir==='asc'?'sort-asc':'sort-desc');
    });
    document.getElementById('page-num').textContent = page;
    document.getElementById('prev-btn').disabled = page <= 1;
    document.getElementById('next-btn').disabled = data.length < PAGE_SIZE;
  }

  function renderStats() {
    const data = (isScreenMode ? screenData : allData).filter(s => !isNaN(parseFloat(s.change_pct)));
    document.getElementById('stat-total').textContent = data.length;
    if (!data.length) return;
    const maxPct = Math.max(...data.map(s => parseFloat(s.change_pct)||0));
    const limits = data.filter(s => parseFloat(s.change_pct) >= 9.9).length;
    const avg = data.reduce((a,s) => a+(parseFloat(s.change_pct)||0), 0) / data.length;
    document.getElementById('stat-max').textContent = maxPct.toFixed(2)+'%';
    document.getElementById('stat-limit').textContent = limits;
    const avgEl = document.getElementById('stat-avg');
    avgEl.textContent = (avg>=0?'+':'') + avg.toFixed(2)+'%';
    avgEl.className = 'value '+(avg>0?'up':avg<0?'down':'flat');
  }

  /* ── Screen mode ── */
  async function runScreen() {
    const btn = document.getElementById('screen-btn');
    btn.classList.add('loading');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="width:14px;height:14px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> 筛选中…`;

    isScreenMode = true;
    stopAuto();
    document.getElementById('screen-banner').style.display = '';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('screen-progress').style.display = '';
    document.getElementById('stock-table').style.display = 'none';
    document.getElementById('pagination').style.display = 'none';
    document.getElementById('empty').style.display = 'none';
    document.getElementById('screen-summary').textContent = '正在扫描全市场…';

    try {
      const res = await fetch('/api/screen');
      const json = await res.json();
      if (!json.success) throw new Error(json.error || '筛选失败');

      screenData = json.all_candidates || [];
      const passed = json.passed || [];

      updateMarketBadge(json.market_open, json.market_open ? '交易中' : '已收盘');
      document.getElementById('stat-time').textContent = (json.time||'').slice(11);
      document.getElementById('screen-summary').innerHTML =
        `扫描 <b style="color:var(--text)">${json.total_scanned}</b> 只股票 → ` +
        `初筛 <b style="color:var(--gold)">${json.total_candidates}</b> 只 → ` +
        `通过 <b style="color:var(--green)">${json.total_passed}</b> 只` +
        `&emsp;<span style="color:var(--muted);font-size:12px">更新于 ${(json.time||'').slice(11)}</span>`;

      renderScreenTable(json.all_candidates);
      renderStats();
    } catch(e) {
      document.getElementById('screen-progress').style.display = 'none';
      document.getElementById('empty').style.display = '';
      document.getElementById('empty').textContent = '筛选失败：' + e.message;
      console.error(e);
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="width:14px;height:14px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> 重新筛选`;
    }
  }

  function renderScreenTable(candidates) {
    document.getElementById('thead-normal').style.display = 'none';
    document.getElementById('thead-screen').style.display = '';
    document.getElementById('screen-progress').style.display = 'none';

    const tbody = document.getElementById('tbody');
    const table = document.getElementById('stock-table');
    const empty = document.getElementById('empty');
    const pagination = document.getElementById('pagination');

    if (!candidates || candidates.length === 0) {
      table.style.display = 'none'; pagination.style.display = 'none';
      empty.style.display = ''; empty.textContent = '无符合初筛条件的股票';
      return;
    }

    empty.style.display = 'none';
    table.style.display = '';
    pagination.style.display = 'none'; // screen mode shows all

    // Sort: passed first, then by change_pct desc
    const sorted = [...candidates].sort((a, b) => {
      if (a.pass !== b.pass) return a.pass ? -1 : 1;
      return (parseFloat(b.change_pct)||0) - (parseFloat(a.change_pct)||0);
    });

    tbody.innerHTML = sorted.map((s, i) => {
      const pc = pctClass(s.change_pct);
      const pctCls = isLimitUp(s.change_pct) ? 'change-pct limit-up' : `change-pct ${pc}`;
      const mkt = s.market === 'SH' ? '<span class="badge badge-sh">沪</span>' : '<span class="badge badge-sz">深</span>';
      const limitCell = s.had_limit_up === false
        ? '<span class="check-fail">✗</span>'
        : s.had_limit_up
          ? '<span class="check-pass">✓</span>'
          : '<span class="check-skip">–</span>';
      const intradayCell = s.fail_reason && s.had_limit_up !== false
        ? `<span class="check-fail" title="${s.fail_reason}">✗ <span style="font-size:11px">${s.fail_reason}</span></span>`
        : s.pass
          ? `<span class="check-pass" title="${s.intraday_reason||''}">✓</span>`
          : '<span class="check-skip">–</span>';
      const result = s.pass
        ? '<span class="check-pass" style="font-weight:700;font-size:14px">✓ 通过</span>'
        : `<span class="check-fail" style="font-size:12px">${s.fail_reason||'✗'}</span>`;

      return `<tr class="${s.pass?'pass-row':'fail-row'}">
        <td style="color:var(--muted);font-size:11px">${i+1}</td>
        <td><div class="stock-name">${s.name}${mkt}</div><div class="stock-code">${s.code}</div></td>
        <td><span class="${pctCls}">${fmt(s.change_pct)}%</span></td>
        <td class="${pc}">${fmt(s.price)}</td>
        <td style="color:var(--gold)">${fmt(s.volume_ratio)}</td>
        <td style="color:var(--gold)">${fmt(s.turnover_rate)}%</td>
        <td style="color:var(--green)">${fmtCap(s.market_cap)}</td>
        <td style="text-align:center">${limitCell}</td>
        <td style="text-align:left">${intradayCell}</td>
        <td>${result}</td>
      </tr>`;
    }).join('');
  }

  /* ── Exit screen mode ── */
  function exitScreenMode() {
    isScreenMode = false;
    screenData = [];
    document.getElementById('screen-banner').style.display = 'none';
    document.getElementById('screen-btn').innerHTML =
      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="width:14px;height:14px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> 2:30 选股`;
    document.getElementById('loading').style.display = '';
    document.getElementById('stock-table').style.display = 'none';
    document.getElementById('pagination').style.display = 'none';
    startAuto();
    fetchData();
  }

  /* ── Sort (normal mode only) ── */
  document.querySelectorAll('#thead-normal th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      if (isScreenMode) return;
      const col = th.dataset.col;
      if (col === 'rank' || col === 'name') return;
      sortDir = sortCol === col ? (sortDir === 'desc' ? 'asc' : 'desc') : 'desc';
      sortCol = col;
      renderNormalTable();
    });
  });

  /* ── Board tabs ── */
  document.querySelectorAll('#board-tabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (isScreenMode) exitScreenMode();
      document.querySelectorAll('#board-tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      board = btn.dataset.board;
      page = 1;
      document.getElementById('loading').style.display = '';
      document.getElementById('stock-table').style.display = 'none';
      fetchData();
    });
  });

  /* ── Pagination ── */
  document.getElementById('prev-btn').addEventListener('click', () => { page--; fetchData(); });
  document.getElementById('next-btn').addEventListener('click', () => { page++; fetchData(); });

  /* ── Refresh / Screen buttons ── */
  document.getElementById('refresh-btn').addEventListener('click', () => {
    if (isScreenMode) exitScreenMode(); else fetchData();
  });
  document.getElementById('screen-btn').addEventListener('click', () => {
    if (isScreenMode) runScreen(); else runScreen();
  });

  /* ── Auto-refresh ── */
  function startAuto() {
    countdown = 30; clearInterval(autoInterval);
    autoInterval = setInterval(() => {
      countdown--;
      document.getElementById('countdown').textContent = `(${countdown}s)`;
      if (countdown <= 0) { fetchData(); countdown = 30; }
    }, 1000);
  }
  function stopAuto() {
    clearInterval(autoInterval);
    document.getElementById('countdown').textContent = '';
  }
  document.getElementById('auto-refresh').addEventListener('change', function () {
    if (!isScreenMode) { this.checked ? startAuto() : stopAuto(); }
  });

  /* ── CSV export ── */
  document.getElementById('export-btn').addEventListener('click', () => {
    const data = isScreenMode ? screenData : sortedData(allData);
    if (!data.length) return;
    const headers = isScreenMode
      ? ['序号','代码','名称','市场','涨跌幅%','现价','量比','换手率%','市值(亿)','30日涨停','通过']
      : ['序号','代码','名称','市场','涨跌幅%','现价','涨跌额','量比','换手率%','市值(亿)','今开','最高','最低','昨收','成交量(手)','成交额(万)','市盈率'];
    const rows = data.map((s, i) => isScreenMode
      ? [i+1, s.code, s.name, s.market, fmt(s.change_pct), fmt(s.price), fmt(s.volume_ratio), fmt(s.turnover_rate), fmtCap(s.market_cap), s.had_limit_up?'是':'否', s.pass?'是':'否（'+s.fail_reason+')']
      : [i+1, s.code, s.name, s.market, fmt(s.change_pct), fmt(s.price), fmt(s.change), fmt(s.volume_ratio), fmt(s.turnover_rate), fmtCap(s.market_cap), fmt(s.open), fmt(s.high), fmt(s.low), fmt(s.prev_close), s.volume, fmtTurnover(s.turnover), fmt(s.pe)]
    );
    const csv = [headers,...rows].map(r=>r.join(',')).join('\n');
    const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${isScreenMode?'选股结果':'涨幅榜'}_${new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'}).replace(/[/:]/g,'-').replace(/\s/g,'_')}.csv`;
    a.click();
  });

  /* ── Init ── */
  fetchData();
  startAuto();
</script>
</body>
</html>
